<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Portes Lithos Shuttle</title>

    <link rel="icon" type="image/png" href="logo.png" />

    <style>
      :root {
        --bg: #f3efe7;        /* warm sand */
        --ink: #2f3b2f;       /* deep resort green */
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: var(--bg); }

      /* Full-screen app frame */
      #appFrame {
        border: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      /* Branded loading overlay shown until the iframe finishes loading */
      #loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: var(--bg);
        color: var(--ink);
        font-family: Georgia, "Times New Roman", serif;
        transition: opacity 0.4s ease;
        z-index: 10;
      }
      #loader.hide {
        opacity: 0;
        pointer-events: none;
      }
      #loader .brand {
        font-size: 22px;
        letter-spacing: 2px;
      }
      #loader .sub {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 13px;
        color: #6b6b6b;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      .spinner {
        width: 34px;
        height: 34px;
        border: 3px solid rgba(47, 59, 47, 0.2);
        border-top-color: var(--ink);
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="loader">
      <div class="brand">Portes Lithos</div>
      <div class="spinner"></div>
      <div class="sub">Loading shuttle reservation…</div>
    </div>

    <iframe
      id="appFrame"
      title="Portes Lithos Shuttle Reservation"
      allow="clipboard-write"
    ></iframe>

    <script>
      // Your deployed Apps Script web app URL (the /exec URL)
      var BASE_URL =
        "https://script.google.com/macros/s/AKfycbyzioLxLFm3jDLZnB0InV8NoaKV4cSb_rQwNWCErbcAtBD7JnO_hms6SJvajifVa8P2/exec";

      // Switch to the staff dashboard by opening this page with ?admin=1
      // e.g.  https://your-host/index.html?admin=1
      var isAdmin = new URLSearchParams(window.location.search).get("admin") === "1";

      var frame = document.getElementById("appFrame");
      frame.src = isAdmin ? BASE_URL + "?admin=1" : BASE_URL;

      // Hide the branded loader once the app inside the iframe has loaded
      frame.addEventListener("load", function () {
        var loader = document.getElementById("loader");
        loader.classList.add("hide");
        setTimeout(function () { loader.style.display = "none"; }, 450);
      });
    </script>
  </body>
</html>
